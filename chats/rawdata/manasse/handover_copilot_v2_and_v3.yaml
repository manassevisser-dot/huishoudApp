#handover_copilot_v2.yaml // OLD VERSION - Just read to understand what we're doing.
agent: next_agent
owner: Manasse Visser
project: W&I Excel UserForms Wizard
version: 2.0
timestamp: 2025-11-24T20:16:12Z

files:
  - layout_grid_specs.txt
  - diff_layout_grid.txt
  - helper_routines.txt
  - vba_stubs_all_forms.txt
  - diff_fullcode_bestpractices.txt
  - handover_next_agent_copilot.txt

forms:
  - name: frmHuishouden
    type: UserForm
    step: 1
  - name: frmVast
    type: UserForm MultiPage
    steps:
      - Inkomsten (page 0)
      - Uitgaven (page 1)
  - name: frmInvoer
    type: UserForm (Dagelijkse)
    step: 4

layout:
  safe_area: {left:12, top:12, width:776, height:476}
  grid: baseline:8, row_height:36, gutter:24
  controls:
    buttons:
      - id: btnVorigeShape, size: {width:80, height:28}
      - id: btnVolgendeShape, size: {width:100, height:28}
      - id: btnOpslaanShape, size: {width:100, height:28}
      - id: btnAnnulerenShape, size: {width:100, height:28}
      - id: btnRowAddShape, size: {width:28, height:28}
      - id: btnRowDelShape, size: {width:28, height:28}

templates:
  row_offsets: {start_top:80, delta_y:36}
  page_0: income row template
  page_1: expense row template

assets:
  sheet: Referenties
  shapes:
    - bg_frmInvoer_landscape
    - btnVorigeShape
    - btnVolgendeShape
    - btnOpslaanShape
    - btnAnnulerenShape
    - btnRowAddShape
    - btnRowDelShape

tables:
  - name: tblCategorieen
    sheet: Referenties
  - name: tblSubcategorieen
    sheet: Referenties
  - name: tbl_payment
    sheet: Referenties
  - name: ErrorLog
    sheet: error_log
    schema: [Timestamp, FormName, Module, Description]

helper_modules:
  - FormHelpers: [ShapeExists, AddShapeAsImage, LoadImagePNG, LockWindowUpdate, EnsureBackgroundImage]
  - Utils: [ParseAmount, ToMonthlyAmount]

validation_rules:
  frmHuishouden:
    - Adults + Children == TotalPersons
    - TotalPersons ≤ 8, ≥ 1
  frmVast:
    - Each row must have Period + Amount > 0
    - MonthlyTotal calculated live via Utils.ToMonthlyAmount
  frmInvoer:
    - Amount > 0
    - Category required

navigation:
  frmHuishouden → frmVast.Page0
  frmVast.Page0.Next → Page1
        .Prev → frmHuishouden
  frmVast.Page1.Next → frmInvoer
        .Prev → frmVast.Page0
  frmInvoer.Prev → frmVast.Page1

acceptance_criteria:
  - All forms load with background and safe-area
  - Shapes appear as images, fallback to CommandButton
  - TabIndex flows logically left-to-right, top-to-bottom
  - Live row addition/removal works, Next/Prev enable/disable appropriately
  - Validate edge cases: “only one adult”, “pregnant or chestfeeding person”
  - Closing via [X] prompts confirmation if unsaved

test_plan:
  scenarios:
    - name: only_one_adult
      actions: [enter TotalPersons=1, select Adult on, no children]
      expect: Next enabled, frmVast opens
    - name: two_adults_one_child
      actions: [TotalPersons=3, Adults=2, Children=1]
      expect: sums validate, navigation works
    - name: pregnant_person
      actions: [select pregnant checkbox, Adults=1]
      expect: uses neutral label “pregnant or chestfeeding person”
    - name: no_fixed_income
      actions: [leave income rows empty, check “No fixed income” flag]
      expect: Next enabled, monthly total = 0
    - name: several_pages_navigation
      actions: navigate through Prev/Next across forms, then close
      expect: correct show/hide backtracking, cancel returns to sheet

best_practices:
  instructions_format: Markdown + YAML is preferred
  agent_manifest: JSON schema v1.4+ or YAML supported by Copilot Studio
  prompt_file: use `.prompt.md` frontmatter YAML for VSCode Copilot

