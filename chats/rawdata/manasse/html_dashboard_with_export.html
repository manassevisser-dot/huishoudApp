<!DOCTYPE html>
<html lang='nl'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Financieel Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f9f9f9; }
        h1 { text-align: center; color: #333; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 45%; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; }
    </style>
    <script type='text/javascript' src='https://www.gstatic.com/charts/loader.js'></script>
    <script>
        google.charts.load('current', {'packages':['corechart']});
        google.charts.setOnLoadCallback(loadCSV);

        function loadCSV() {
            fetch('export_data.csv')
                .then(response => response.text())
                .then(text => {
                    const rows = text.trim().split('
').map(r => r.split(','));
                    drawCharts(rows);
                });
        }

        function drawCharts(rows) {
            // Zet CSV-data om naar Google Charts DataTable
            const dataArray = [['Datum', 'Bedrag']];
            for (let i = 1; i < rows.length; i++) {
                dataArray.push([rows[i][0], parseFloat(rows[i][5])]);
            }

            var data = google.visualization.arrayToDataTable(dataArray);
            var options = { title: 'Dagelijkse Uitgaven', legend: { position: 'bottom' } };
            var chart = new google.visualization.LineChart(document.getElementById('linechart'));
            chart.draw(data, options);
        }
    </script>
</head>
<body>
    <h1>Financieel Dashboard</h1>
    <div class='container'>
        <div class='card'>
            <h2>Grafiek: Dagelijkse Uitgaven</h2>
            <div id='linechart' style='width:100%; height:300px;'></div>
        </div>
    </div>
</body>
</html>
